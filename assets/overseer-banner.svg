<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1424"/>
      <stop offset="0.55" stop-color="#0c1c30"/>
      <stop offset="1" stop-color="#0e2438"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#7df0ff"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0b3a44"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <!-- watchful radar rings on the right -->
  <g fill="none" stroke="#1c3a54" stroke-width="2" opacity="0.55">
    <circle cx="1090" cy="160" r="60"/>
    <circle cx="1090" cy="160" r="110"/>
    <circle cx="1090" cy="160" r="160"/>
  </g>
  <circle cx="1090" cy="160" r="6" fill="url(#acc)"/>

  <!-- logo tile -->
  <g transform="translate(70,80)">
    <rect width="160" height="160" rx="34" fill="#0e2236" stroke="url(#acc)" stroke-width="3"/>
    <ellipse cx="80" cy="70" rx="58" ry="34" fill="#06121e"/>
    <ellipse cx="80" cy="70" rx="58" ry="34" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <circle cx="80" cy="70" r="22" fill="url(#iris)"/>
    <circle cx="80" cy="70" r="8.5" fill="#03131a"/>
    <circle cx="71" cy="62" r="5" fill="#d6fbff" opacity="0.92"/>
    <text x="80" y="132" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" fill="#5fe6cf" font-weight="700">&gt;_</text>
  </g>

  <!-- wordmark -->
  <text x="272" y="150" font-size="86" font-weight="800" fill="#eaf2fb" letter-spacing="7">OVERSEER</text>
  <text x="276" y="204" font-size="26" fill="#8aa0b8" letter-spacing="0.5">lean &#183; self-healing &#183; multi-provider AI agent for your server</text>

  <!-- heartbeat pulse (self-healing motif) -->
  <path d="M276 250 H452 l16 -30 22 60 18 -44 14 26 H812" fill="none" stroke="url(#acc)"
        stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>

  <!-- zero-deps pill -->
  <g transform="translate(840,234)">
    <rect x="0" y="0" width="186" height="34" rx="17" fill="#0e2236" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="22" cy="17" r="5" fill="#34d399"/>
    <text x="40" y="23" font-size="16" fill="#9fe9da" font-weight="600">zero dependencies</text>
  </g>
</svg>
